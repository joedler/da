<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>畢旅查詢系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  </head>
  <body class="min-h-screen bg-slate-50 text-slate-900">
    <main class="mx-auto flex min-h-screen max-w-xl flex-col justify-center px-5 py-10" x-data>
      <section class="space-y-5">
        <div>
          <p class="text-sm font-medium text-teal-700">Graduation Trip</p>
          <h1 class="mt-2 text-3xl font-bold">畢旅查詢系統</h1>
          <p class="mt-3 text-base leading-7 text-slate-600">
            本系統提供車次、桌號、房號、房間編組、同房人員與素食註記查詢。
          </p>
        </div>

        <div class="rounded-lg border border-slate-200 bg-white p-4 shadow-sm">
          <p class="font-semibold">目前狀態</p>
          <p class="mt-2 text-sm leading-6 text-slate-600">
            GitHub Pages 前端已建立。下一步會接上 LIFF SDK 與 GAS API。
          </p>
        </div>

        <div class="rounded-lg border border-amber-200 bg-amber-50 p-4 text-sm leading-6 text-amber-900">
          本系統不是即時客服。臨時狀況、資料異動或個人問題，請聯絡班導、隨隊老師或旅行社窗口。
        </div>
      </section>
    </main>
  </body>
</html>
